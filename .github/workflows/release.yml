name: Release on Version Tag

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  PYTHONUNBUFFERED: 1

jobs:
  build-binaries:
    name: Build executable (${{ matrix.id }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - id: linux-amd64
            os: ubuntu-latest
            artifact_name: qa-linux-amd64.tar.gz
            executable_name: qa
            pyinstaller_arch: x86_64
          - id: linux-arm64
            os: ubuntu-24.04-arm
            artifact_name: qa-linux-arm64.tar.gz
            executable_name: qa
            pyinstaller_arch: aarch64
          - id: macos-arm64
            os: macos-latest
            artifact_name: qa-macos-arm64.zip
            executable_name: qa
            pyinstaller_arch: arm64
          - id: windows-amd64
            os: windows-latest
            artifact_name: qa-windows-amd64.zip
            executable_name: qa.exe
            pyinstaller_arch: x86_64

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup uv
        uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.14"
          enable-cache: true

      - name: Sync dependencies
        run: uv sync

      - name: Build single-file executable
        run: uv run --with pyinstaller pyinstaller --onefile --name qa query_analyzer/__main__.py

      - name: Package executable (Linux/macOS)
        if: runner.os == 'Linux'
        run: |
          mkdir -p dist
          mkdir -p package
          cp dist/qa "package/qa"
          chmod +x package/qa
          tar -czf "dist/${{ matrix.artifact_name }}" -C package .

      - name: Package executable (macOS)
        if: runner.os == 'macOS'
        run: |
          mkdir -p dist
          mkdir -p package
          cp dist/qa "package/qa"
          chmod +x package/qa
          (cd package && zip -r "../dist/${{ matrix.artifact_name }}" .)

      - name: Package executable (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path dist -Force | Out-Null
          New-Item -ItemType Directory -Path "package/qa-windows-amd64/bin" -Force | Out-Null
          Copy-Item "dist/qa.exe" "package/qa-windows-amd64/bin/qa.exe"
          Compress-Archive -Path "package/qa-windows-amd64" -DestinationPath "dist/${{ matrix.artifact_name }}" -Force

      - name: Upload packaged binary
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.id }}
          path: dist/${{ matrix.artifact_name }}
          if-no-files-found: error

  publish-packagers:
    name: Publish package managers via JReleaser
    runs-on: ubuntu-latest
    needs:
      - build-binaries

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download binary artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets

      - name: Prepare dist
        run: |
          mkdir -p dist
          find release-assets -type f -name "*" -exec cp {} dist/ \;

      - name: Verify packaged artifacts layout
        run: |
          python -c "import zipfile, tarfile; norm=lambda s:s.lstrip('./'); t=tarfile.open('dist/qa-linux-amd64.tar.gz','r:gz'); n=[norm(x) for x in t.getnames()]; t.close(); assert 'qa' in n, f'qa missing in linux tar: {n}'; z=zipfile.ZipFile('dist/qa-macos-arm64.zip','r'); n=[norm(x) for x in z.namelist()]; z.close(); assert 'qa' in n, f'qa missing in mac zip: {n}'; z=zipfile.ZipFile('dist/qa-windows-amd64.zip','r'); n=[norm(x) for x in z.namelist()]; z.close(); assert any(x.endswith('bin/qa.exe') for x in n), f'bin/qa.exe missing in windows zip: {n}'"

      - name: Setup Java for JReleaser
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Resolve project version from tag
        run: |
          echo "PROJECT_VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_ENV"

      - name: Run JReleaser
        uses: jreleaser/release-action@v2
        with:
          arguments: full-release
        env:
          JRELEASER_PROJECT_VERSION: ${{ env.PROJECT_VERSION }}
          JRELEASER_GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          JRELEASER_HOMEBREW_GITHUB_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          JRELEASER_SCOOP_GITHUB_TOKEN: ${{ secrets.SCOOP_BUCKET_TOKEN }}
          SCOOP_BUCKET_TOKEN: ${{ secrets.SCOOP_BUCKET_TOKEN }}
          SNAP_REPO_TOKEN: ${{ secrets.SNAP_REPO_TOKEN }}
          JRELEASER_SNAP_EXPORT_LOGIN: ${{ secrets.SNAPCRAFT_STORE_CREDENTIALS }}

      - name: Upload JReleaser logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jreleaser-logs
          path: |
            out/jreleaser/trace.log
            out/jreleaser/output.properties
